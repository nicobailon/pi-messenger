decisions:
  - "Shape H over bundling: jiti wrapper avoids esbuild dependency, __dirname breakage, bundle bloat, dynamic import issues, and R7 violations"
  - "npm prefix -g over which pi: avoids hard dependency on pi being in PATH at install time"
  - "Homebrew bin symlink: ~/.pi/agent/bin/ is only in PATH inside pi sessions — /opt/homebrew/bin/ is the real system-wide PATH on macOS"
  - "Collision guard exits 0 when wrapper succeeds: the wrapper IS the deliverable, extension copy skip is informational"
  - "R4 as hard error: non-pi workers literally cannot function without pi-messenger-cli — a warning is insufficient"
  - "Spec 008: different pollTimeoutMs per caller (not context field + D5 gating) — simpler, no PollOptions change, no existing test modifications"

findings:
  - "CRITICAL LEARNING: every agent in the pipeline runs inside pi where getShellEnv() adds ~/.pi/agent/bin/ to PATH. This masks the fact that regular terminals don't have it. Survived 8 shapes, 3 challengers, 6 Codex rounds before the user caught it in 5 seconds from Terminal."
  - "Pi ships with jiti (@mariozechner/jiti) that handles .ts → .js import convention — Node's built-in TS support (strip-types, transform-types) cannot"
  - "Spec 006 D5 (absolute poll timeout) was correct for send context but regressed spawn — the same pollForCollaboratorMessage function handles both with no context awareness"
  - "The CLI without spawn/dismiss was useless — non-pi agents need to orchestrate collaboration, not just do worker tasks"

failed:
  - "PATH verification from inside pi — environmental bias that every agent shares. Must use clean env (env -i PATH=... which <cmd>)"
  - "Shipping CLI without spawn/dismiss — missed the fundamental use case despite extensive shaping and review"

