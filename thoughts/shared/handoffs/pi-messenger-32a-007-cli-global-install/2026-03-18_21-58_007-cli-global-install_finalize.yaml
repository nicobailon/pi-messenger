goal: "Make pi-messenger-cli globally available so non-pi runtimes (Codex, Claude Code) can participate in the collaboration protocol. Full pipeline: shape, plan, codex-review, implement, code-verify. Also fix spawn stall regression (spec 008) that was blocking collaborator spawns."
