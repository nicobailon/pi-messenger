final_solutions:
  - problem: "Driver blocks indefinitely when collaborator finishes and never replies"
    solution: "Three enforcement layers: D2 (driver sends phase:complete → non-blocking), D4 (collaborator sent phase:complete → peerTerminal arms auto-terminate on next send), D5 (absolute pollTimeoutMs fires regardless of log growth)"
  - problem: "Stall detection never fires when collaborator log drips heartbeat bytes"
    solution: "Added pollTimeoutMs (default 300s) as absolute wall-clock timeout independent of log-growth stall. Two stall types: stallType:'log' vs stallType:'timeout' for different error messages"
  - problem: "completedCollaborators can shadow live agents that reuse same name"
    solution: "Triple-gate: check findCollaboratorByName (in-memory) → validateTargetAgent (mesh registry) → completedCollaborators. Live agent always takes precedence. Spawn collision loop also checks mesh."
  - problem: "Built-in collaborator never emits structured phase — D2/D4 would never fire"
    solution: "Updated crew-challenger.md Phase 4 section to use phase parameter on all sends. phase:'complete' mandatory on last message."

final_decisions:
  - decision: "Only 'complete' is terminal. 'approved' is a verdict but non-terminal."
    rationale: "Agents use 'agree' casually as filler. 'approved' is heavier but still informational. Only 'complete' means 'I'm done, no more messages.' Reduces false terminations."
  - decision: "Driver's final ack is best-effort delivery"
    rationale: "The message file is written to inbox but gracefulDismiss may kill collaborator before its watcher consumes it. Acceptable because collaborator already declared itself done. Feed log persists for audit trail."
  - decision: "pollTimeoutMs is an absolute timeout, not activity-based"
    rationale: "Different from log-growth stall (which resets on log activity). The absolute timeout never resets — catches the exact PureYak incident where heartbeat bytes kept log-stall from ever firing."

